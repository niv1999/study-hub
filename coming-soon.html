<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>בקרוב | Study Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FBF7F0; --surface:#FFFDF8; --surface-2:#FBF5EA;
  --ink:#33302B; --ink-soft:#6B655C; --line:#E7DECF; --accent:#C9A24B;
  --shadow:0 2px 10px rgba(120,100,70,.08), 0 1px 3px rgba(120,100,70,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Heebo',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 20px;text-align:center;
}
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:16px;
  box-shadow:var(--shadow);padding:44px 36px;max-width:480px;width:100%;
}
.icon{font-size:3rem;display:block;margin-bottom:14px}
h1{font-size:1.6rem;font-weight:800;margin-bottom:6px}
.course{color:var(--accent);font-weight:800}
p{color:var(--ink-soft);line-height:1.7;margin-top:8px}
a.back{
  display:inline-block;margin-top:22px;font-weight:700;color:var(--accent);
  text-decoration:none;border:1px solid var(--line);border-radius:999px;
  padding:8px 22px;background:var(--surface-2);
}
a.back:hover{border-color:var(--accent)}

/* ---- Dark theme: light-ish warm dark, user toggle (hub-theme) ---- */
.theme-toggle{position:fixed;top:.85rem;inset-inline-end:.85rem;z-index:80;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--line);box-shadow:0 4px 14px rgba(120,100,70,.18);font-size:1.2rem;line-height:1;cursor:pointer;padding:0;transition:transform .15s ease,border-color .15s ease}
.theme-toggle:hover{border-color:var(--accent);transform:translateY(-2px)}
.theme-toggle:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
html[data-theme="dark"]{
  --bg:#2B2823; --bg-2:#272420; --surface:#343029; --surface-2:#3C3730;
  --ink:#EDE7DB; --ink-soft:#ACA395; --line:#4B453B;
  --dusty-blue:#8FAEC4; --clay:#D6957A; --sage:#98B8A2; --plum:#BA9CBE;
  --teal:#86C1B5; --rose:#D699AC; --slate:#9AA9BF; --mustard:#D9B566;
  --ok:#82BF8F; --err:#E0897B;
  --shadow:0 2px 10px rgba(0,0,0,.28),0 1px 3px rgba(0,0,0,.22);
  --shadow-lg:0 8px 30px rgba(0,0,0,.38),0 2px 8px rgba(0,0,0,.28);
  color-scheme:dark;
}
html[data-theme="dark"] .hub-home,
html[data-theme="dark"] .theme-toggle{box-shadow:0 4px 14px rgba(0,0,0,.4)}
html[data-theme="dark"] .lab-output .lab-msg-ok{color:#93d3a0}
html[data-theme="dark"] .lab-output .lab-msg-err{color:#f2a79e}
</style>
<script>try{var t=localStorage.getItem('hub-theme');if(t==null&&window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)t='dark';if(t==='dark')document.documentElement.setAttribute('data-theme','dark')}catch(e){}</script>
</head>
<body>
  <div class="card">
    <span class="icon">🚧</span>
    <h1>‏<span class="course" id="course-name">הקורס הזה</span> — בקרוב</h1>
    <p>אתר הלימוד לקורס הזה עוד לא נבנה. כשחומרי הקורס יהיו מוכנים — הוא יופיע כאן, באותו פורמט: סיכומים אינטראקטיביים, שאלות תרגול ומבחני דמה.</p>
    <a class="back" href="index.html">→ חזרה ל-Study Hub</a>
  </div>
  <script>
    (function () {
      var c = new URLSearchParams(location.search).get('c');
      if (c) document.getElementById('course-name').textContent = c;
    })();
  </script>
<script>
/* ---- theme toggle: light-ish dark mode, persists via localStorage('hub-theme') ---- */
(function () {
  function isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }
  var btn = document.createElement('button');
  btn.className = 'theme-toggle';
  btn.type = 'button';
  function paint() {
    btn.textContent = isDark() ? '\u2600\uFE0F' : '\uD83C\uDF19';
    var label = isDark() ? '\u05de\u05e2\u05d1\u05e8 \u05dc\u05de\u05e6\u05d1 \u05d1\u05d4\u05d9\u05e8' : '\u05de\u05e2\u05d1\u05e8 \u05dc\u05de\u05e6\u05d1 \u05db\u05d4\u05d4';
    btn.setAttribute('aria-label', label);
    btn.title = label;
  }
  btn.addEventListener('click', function () {
    if (isDark()) document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', 'dark');
    try { localStorage.setItem('hub-theme', isDark() ? 'dark' : 'light'); } catch (e) {}
    paint();
  });
  paint();
  document.body.appendChild(btn);
})();
</script>
</body>
</html>
